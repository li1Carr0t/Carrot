name: Carrot Night Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Combine Lua files
        run: |
          echo "Building Lua..."
          cat *.lua > build.lua

      - name: Commit build.lua
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add build.lua
          git commit -m "auto build lua" || echo "no changes"
          git push
