name: Development Build

on:
  push:
    branches: [ "main" ]
    paths: 
      - '.github/workflows/build.lua'   # Trigger เฉพาะไฟล์นี้
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/build.lua'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ ตรวจสอบไฟล์ build.lua
      - name: List build.lua
        run: |
          echo "Checking build.lua in workflows folder..."
          ls -l .github/workflows/build.lua

      # 3️⃣ ใช้ build.lua ต่อ (ถ้าต้องการรัน)
      - name: Run build.lua (optional)
        run: |
          echo "Running build.lua..."
          lua .github/workflows/build.lua
